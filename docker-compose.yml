services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stnk-postgres
    environment:
      POSTGRES_DB: stnk_bureau
      POSTGRES_USER: stnk_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stnk_user -d stnk_bureau']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stnk-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stnk-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD} ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stnk-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stnk-backend
    environment:
      DATABASE_URL: postgresql://stnk_user:${POSTGRES_PASSWORD}@postgres:5432/stnk_bureau
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3000
      APP_URL: http://backend:3000
      TRACKING_URL: http://localhost:3001/tracking
      FRONTEND_URL: http://localhost:3001
      ALLOWED_ORIGINS: http://localhost:3001
      INVOICE_STORAGE_PATH: /app/backend/storage/invoices
      TENANT_LOGO_STORAGE_PATH: /app/backend/uploads/tenant-logos
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/backend/storage
      - backend_uploads:/app/backend/uploads
    networks:
      - stnk-network
    command: ["sh", "-c", "npx prisma migrate deploy && npm start"]
    restart: unless-stopped

  # Frontend Dashboard
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stnk-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_APP_NAME: STNK Bureau Admin
      NODE_ENV: production
    ports:
      - '3001:3000'
    depends_on:
      - backend
    networks:
      - stnk-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: stnk-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - stnk-network
    restart: unless-stopped
    profiles:
      - 'production'

volumes:
  postgres_data:
    driver: local
  backend_storage:
    driver: local
  backend_uploads:
    driver: local

networks:
  stnk-network:
    driver: bridge

