version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stnk-postgres
    environment:
      POSTGRES_DB: stnk_bureau
      POSTGRES_USER: stnk_user
      POSTGRES_PASSWORD: stnk_password_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stnk_user -d stnk_bureau']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stnk-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stnk-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stnk-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stnk-backend
    environment:
      DATABASE_URL: postgresql://stnk_user:stnk_password_dev@postgres:5432/stnk_bureau
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_change_in_production
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-}
      NODE_ENV: production
      PORT: 3000
      APP_URL: http://backend:3000
      TRACKING_BASE_URL: http://localhost:3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stnk-network
    command: ["sh", "-c", "npx prisma db push && npm start"]
    restart: unless-stopped

  # Frontend Dashboard
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stnk-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_APP_NAME: STNK Bureau Admin
      NODE_ENV: production
    ports:
      - '3001:3000'
    depends_on:
      - backend
    networks:
      - stnk-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: stnk-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - stnk-network
    restart: unless-stopped
    profiles:
      - 'production'

volumes:
  postgres_data:
    driver: local

networks:
  stnk-network:
    driver: bridge

